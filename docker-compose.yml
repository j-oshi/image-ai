  # Stable Diffusion + Segmentation Service
  sd-api:
    build:
      context: .
      dockerfile: Dockerfile.sd
    container_name: sd-api
    tty: true
    ports:
      - "5000:5000"
    shm_size: '8gb'
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./outputs:/app/outputs
      - .:/app  # <--- ADD THIS LINE: Maps your local code to the container
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python3 app.py
    environment:
      - HF_TOKEN=${hf_abc123}
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - PYTHONUNBUFFERED=1