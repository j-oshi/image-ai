<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Background Variations</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --p: #6366f1; --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .nav { width: 100%; padding: 1rem; background: var(--panel); display: flex; gap: 1rem; justify-content: center; border-bottom: 1px solid #334155; }
        .editor-container { display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1200px; }
        .canvas-box { border: 2px solid #334155; background: #000; border-radius: 8px; overflow: hidden; }
        .controls { width: 350px; background: var(--panel); padding: 20px; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        button { background: var(--p); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; transition: filter 0.2s; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #475569; cursor: not-allowed; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .variation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .variation-card { border: 2px solid transparent; border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; background: #000; aspect-ratio: 1/1; }
        .variation-card:hover { border-color: var(--p); }
        .variation-card img { width: 100%; height: 100%; object-fit: cover; }
        .seed-tag { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 5px; width: 100%; }
        #status { font-size: 13px; color: #94a3b8; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="nav">
    <strong>AI Object Background Lab</strong>
</div>

<div class="editor-container">
    <div class="canvas-box">
        <canvas id="crop-canvas"></canvas>
    </div>

    <div class="controls">
        <label>1. Source Image</label>
        <input type="file" id="upload" accept="image/*" onchange="loadImage(event)">
        
        <label>2. Describe New Scene</label>
        <textarea id="bg-prompt" rows="3" placeholder="A futuristic laboratory with neon lights, high detail..."></textarea>
        
        <div id="status">Ready to isolate object.</div>
        <div id="timer-display" style="font-family: monospace; color: #10b981; margin-bottom: 5px; font-weight: bold;">
            Time: 0.0s
        </div>
        <button id="gen-btn" onclick="generateVariations()">Generate 4 Variants</button>
        
        <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">
        <label>Variations (Click to select)</label>
        <div class="variation-grid" id="results"></div>
    </div>
</div>

<script>
    let canvas, boundingBox, timerInterval;

    window.onload = () => {
        canvas = new fabric.Canvas('crop-canvas', {
            width: 600,
            height: 600,
            backgroundColor: '#000'
        });

        // Pre-create the boundary box
        boundingBox = new fabric.Rect({
            left: 150, top: 150, width: 200, height: 200,
            fill: 'rgba(99, 102, 241, 0.2)',
            stroke: '#6366f1', strokeDashArray: [5, 5],
            strokeWidth: 2, cornerColor: '#fff', cornerSize: 12,
            transparentCorners: false, hasRotatingPoint: false
        });
    };

    function loadImage(e) {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.clear();
                img.scaleToWidth(canvas.width);
                canvas.add(img);
                canvas.sendToBack(img);
                canvas.add(boundingBox);
                canvas.setActiveObject(boundingBox);
                document.getElementById('status').innerText = "Adjust box around the object.";
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    async function fetchImage(prompt, fullCanvasBlob, maskBlob) {
        const formData = new FormData();
        formData.append('prompt', prompt);
        formData.append('image', fullCanvasBlob, 'image.png');
        formData.append('mask', maskBlob, 'mask.png');
        
        const resp = await fetch('http://localhost:5000/test-generate', {
            method: 'POST',
            body: formData
        });
        
        if (!resp.ok) throw new Error("Backend error");
        const blob = await resp.blob();
        return {
            url: URL.createObjectURL(blob),
            seed: resp.headers.get('x-used-seed') || 'N/A'
        };
    }

    async function generateVariations() {
        const promptInput = document.getElementById('bg-prompt').value;
        const btn = document.getElementById('gen-btn');
        const resultsContainer = document.getElementById('results');
        const status = document.getElementById('status');
        const timerElement = document.getElementById('timer-display');
        
        if(!promptInput) return alert("Enter a prompt!");
        if(!canvas.getObjects('image').length) return alert("Upload an image first!");

        // --- STEP 1: PREPARE THE IMAGES ---
        btn.disabled = true;
        status.innerText = "Capturing layers...";

        // A. The Full Image (Init Image)
        boundingBox.set('stroke', 'transparent'); // Hide box for clean capture
        canvas.renderAll();
        const fullImageBlob = await new Promise(res => canvas.getElement().toBlob(res, 'image/png'));

        // B. The Mask (White = area to change, Black = area to keep)
        // Note: We want to keep what is INSIDE the box, so inside must be BLACK.
        const mainImage = canvas.getObjects('image')[0];
        const originalBG = canvas.backgroundColor;
        
        // Make everything WHITE (change everything)
        canvas.setBackgroundColor('#ffffff', null);
        mainImage.set('opacity', 0); // Hide the person
        
        // Make the box BLACK (keep this area)
        boundingBox.set({ fill: '#000000', stroke: 'transparent' });
        canvas.renderAll();
        
        const maskBlob = await new Promise(res => canvas.getElement().toBlob(res, 'image/png'));

        // Restore Canvas UI
        mainImage.set('opacity', 1);
        canvas.setBackgroundColor(originalBG, null);
        boundingBox.set({ fill: 'rgba(99, 102, 241, 0.2)', stroke: '#6366f1' });
        canvas.renderAll();

        // --- STEP 2: TIMER & API CALL ---
        resultsContainer.innerHTML = '';
        status.innerText = "GPU Processing...";
        const startTime = performance.now();
        
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
            timerElement.innerText = `Time: ${elapsed}s`;
        }, 100);

        try {
            const requests = [
                fetchImage(promptInput, fullImageBlob, maskBlob),
                fetchImage(promptInput, fullImageBlob, maskBlob),
                fetchImage(promptInput, fullImageBlob, maskBlob),
                fetchImage(promptInput, fullImageBlob, maskBlob)
            ];

            const outputs = await Promise.all(requests);
            
            clearInterval(timerInterval);
            status.innerText = "Batch Complete!";

            outputs.forEach(data => {
                const card = document.createElement('div');
                card.className = 'variation-card';
                card.style.cursor = 'pointer';
                card.onclick = () => window.open(data.url);
                card.innerHTML = `
                    <img src="${data.url}" style="width:100%">
                    <div class="seed-tag" style="background:rgba(0,0,0,0.5); color:white; font-size:10px; padding:2px;">Seed: ${data.seed}</div>
                `;
                resultsContainer.appendChild(card);
            });

        } catch (err) {
            clearInterval(timerInterval);
            console.error(err);
            status.innerText = "Error: Check backend.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
