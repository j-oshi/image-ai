<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Object Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border-right: 1px solid #334155;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        h2 { margin: 0; font-size: 1.25rem; color: var(--primary); letter-spacing: -0.025em; }
        
        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.875rem; font-weight: 500; color: var(--text-muted); }

        input[type="text"], input[type="file"] {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.875rem;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-group { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }

        button {
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-outline { 
            background-color: transparent; 
            color: var(--text-muted); 
            border: 1px solid #334155; 
        }
        .btn-outline:hover { color: var(--danger); border-color: var(--danger); }

        button:disabled { background-color: #475569; cursor: not-allowed; opacity: 0.5; }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: auto;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 20px 20px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-color: #1e293b;
            display: none;
        }

        #loader {
            display: none;
            position: absolute;
            z-index: 20;
            background: rgba(99, 102, 241, 0.95);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .hint { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; }
        
        #placeholder {
            color: var(--text-muted);
            text-align: center;
            border: 2px dashed #334155;
            padding: 4rem;
            border-radius: 1rem;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Object Explorer</h2>
        
        <div class="control-group">
            <label>1. Upload Image</label>
            <input id="uploadInput" type="file" accept="image/*"/>
        </div>

        <div class="control-group">
            <label>2. Filter Labels</label>
            <input id="filterInput" type="text" placeholder="e.g. laptop, cup"/>
            <div class="hint">Comma separated list.</div>
        </div>

        <div class="btn-group">
            <button id="runBtn" class="btn-primary">Run Detection</button>
            <button id="resetBtn" class="btn-outline">Clear Workspace</button>
        </div>

        <div style="margin-top: auto;">
            <div class="hint">Model: YOLOv8m<br>Status: Ready</div>
        </div>
    </div>

    <div class="main-content">
        <div id="loader">Processing...</div>
        <div id="placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:10px; opacity:0.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <br>Upload an image to start
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        const uploadInput = document.getElementById("uploadInput");
        const filterInput = document.getElementById("filterInput");
        const runBtn = document.getElementById("runBtn");
        const resetBtn = document.getElementById("resetBtn");
        const loader = document.getElementById("loader");
        const canvas = document.getElementById("mainCanvas");
        const placeholder = document.getElementById("placeholder");
        
        let currentFile = null;
        let session = null;

        // Preview Handler
        uploadInput.addEventListener("change", (e) => {
            currentFile = e.target.files[0];
            if (currentFile) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        placeholder.style.display = "none";
                        canvas.style.display = "block";
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(currentFile);
            }
        });

        // Reset Handler
        resetBtn.addEventListener("click", () => {
            currentFile = null;
            uploadInput.value = "";
            filterInput.value = "";
            canvas.style.display = "none";
            placeholder.style.display = "block";
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        runBtn.addEventListener("click", async () => {
            if (!currentFile) return alert("Please select an image.");

            runBtn.disabled = true;
            loader.style.display = "block";

            try {
                const filterValue = filterInput.value.toLowerCase().trim();
                const allowedLabels = filterValue ? filterValue.split(',').map(s => s.trim()) : [];

                const boxes = await detect_objects_on_image(currentFile);
                const filteredBoxes = allowedLabels.length > 0 
                    ? boxes.filter(box => allowedLabels.includes(box[4].toLowerCase()))
                    : boxes;

                await draw_image_and_boxes(currentFile, filteredBoxes);
            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                runBtn.disabled = false;
                loader.style.display = "none";
            }
        });

        async function draw_image_and_boxes(file, boxes) {
            return new Promise(resolve => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0);
                    
                    boxes.forEach(([x1, y1, x2, y2, label, prob]) => {
                        ctx.strokeStyle = "#6366f1";
                        ctx.lineWidth = Math.max(img.width * 0.005, 3);
                        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
                        
                        ctx.fillStyle = "#6366f1";
                        const fontSize = Math.max(img.width * 0.02, 14);
                        ctx.font = `bold ${fontSize}px sans-serif`;
                        const text = `${label} ${(prob * 100).toFixed(0)}%`;
                        const textWidth = ctx.measureText(text).width;
                        
                        ctx.fillRect(x1, y1 - fontSize - 10, textWidth + 10, fontSize + 10);
                        ctx.fillStyle = "white";
                        ctx.fillText(text, x1 + 5, y1 - 8);
                    });
                    resolve();
                }
            });
        }

        // YOLO Core Logic
        async function detect_objects_on_image(buf) {
            const [input, w, h] = await prepare_input(buf);
            const output = await run_model(input);
            return process_output(output, w, h);
        }

        async function prepare_input(buf) {
            return new Promise(resolve => {
                const img = new Image();
                img.src = URL.createObjectURL(buf);
                img.onload = () => {
                    const offscreen = document.createElement("canvas");
                    offscreen.width = 640; offscreen.height = 640;
                    const ctx = offscreen.getContext("2d");
                    ctx.drawImage(img, 0, 0, 640, 640);
                    const data = ctx.getImageData(0, 0, 640, 640).data;
                    const red = [], green = [], blue = [];
                    for (let i = 0; i < data.length; i += 4) {
                        red.push(data[i] / 255.0);
                        green.push(data[i+1] / 255.0);
                        blue.push(data[i+2] / 255.0);
                    }
                    resolve([[...red, ...green, ...blue], img.width, img.height]);
                }
            })
        }

        async function run_model(input) {
            if (!session) {
                loader.innerText = "Loading AI Model...";
                session = await ort.InferenceSession.create("yolov8m.onnx");
                loader.innerText = "Processing...";
            }
            const tensor = new ort.Tensor(Float32Array.from(input), [1, 3, 640, 640]);
            const outputs = await session.run({ images: tensor });
            return outputs["output0"].data;
        }

        function process_output(output, img_width, img_height) {
            let boxes = [];
            for (let index = 0; index < 8400; index++) {
                const [class_id, prob] = [...Array(80).keys()]
                    .map(col => [col, output[8400 * (col + 4) + index]])
                    .reduce((accum, item) => item[1] > accum[1] ? item : accum, [0, 0]);
                if (prob < 0.45) continue;
                const xc = output[index], yc = output[8400+index], w = output[2*8400+index], h = output[3*8400+index];
                boxes.push([(xc-w/2)/640*img_width, (yc-h/2)/640*img_height, (xc+w/2)/640*img_width, (yc+h/2)/640*img_height, yolo_classes[class_id], prob]);
            }
            boxes.sort((a, b) => b[5] - a[5]);
            const result = [];
            while (boxes.length > 0) {
                result.push(boxes[0]);
                boxes = boxes.filter(box => iou(boxes[0], box) < 0.7);
            }
            return result;
        }

        function iou(b1, b2) {
            const x1 = Math.max(b1[0], b2[0]), y1 = Math.max(b1[1], b2[1]), x2 = Math.min(b1[2], b2[2]), y2 = Math.min(b1[3], b2[3]);
            const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
            const area1 = (b1[2]-b1[0])*(b1[3]-b1[1]), area2 = (b2[2]-b2[0])*(b2[3]-b2[1]);
            return inter / (area1 + area2 - inter);
        }

        const yolo_classes = ['person','bicycle','car','motorcycle','airplane','bus','train','truck','boat','traffic light','fire hydrant','stop sign','parking meter','bench','bird','cat','dog','horse','sheep','cow','elephant','bear','zebra','giraffe','backpack','umbrella','handbag','tie','suitcase','frisbee','skis','snowboard','sports ball','kite','baseball bat','baseball glove','skateboard','surfboard','tennis racket','bottle','wine glass','cup','fork','knife','spoon','bowl','banana','apple','sandwich','orange','broccoli','carrot','hot dog','pizza','donut','cake','chair','couch','potted plant','bed','dining table','toilet','tv','laptop','mouse','remote','keyboard','cell phone','microwave','oven','toaster','sink','refrigerator','book','clock','vase','scissors','teddy bear','hair drier','toothbrush'];
    </script>
</body>
</html>
