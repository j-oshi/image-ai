<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Image Variant Studio</title>
<link rel="stylesheet" href="../styles/styles.css">
<style>
/* CONTROLS */
.controls {
  max-width: 900px;
  margin: 30px auto;
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  border: 1px solid #e5e7eb;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  align-items: flex-end;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.input-group label {
  font-size: 13px;
  color: #555;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  min-width: 220px;
}

button {
  padding: 10px 20px;
  background: #4f46e5;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:disabled {
  background: #aaa;
}

/* TIMER */
.timer {
  text-align: center;
  margin-top: 10px;
  font-family: monospace;
  color: #4f46e5;
}

/* GRID */
.grid {
  max-width: 1100px;
  margin: 30px auto;
  padding: 0 20px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.download-btn {
  text-decoration: none;
  color: #4f46e5;
  border: 1px solid #4f46e5;
  padding: 4px 8px;
  border-radius: 6px;
  font-weight: bold;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: #888;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <h2>AI Vision</h2>
  <div>
    <a href="#">Docs</a>
    <a href="#">Models</a>
    <a href="#">GitHub</a>
  </div>
</div>
<div style="text-align:left; margin-top:20px; margin-left:20px;">
  <a href="../index.html" style="
    text-decoration:none;
    color:#4f46e5;
    font-size:14px;
    border:1px solid #e5e7eb;
    padding:6px 12px;
    border-radius:8px;
    background:#fff;
  ">
    ← Back to Home
  </a>
</div>
<!-- HERO -->
<section class="hero">
  <h1>AI Image Variant Studio</h1>
  <p>Generate multiple variations of prompt using AI. Compare outputs and download your favorites.</p>
</section>

<!-- CONTROLS -->
<div class="controls">
  <div class="input-group">
    <label>Prompt</label>
    <input type="text" id="prompt" value="Children in a school bus">
  </div>

  <div class="input-group">
    <label>Variants</label>
    <select id="variants">
      <option value="1">1 Variant</option>
      <option value="2">2 Variants</option>
      <option value="4" selected>4 Variants</option>
    </select>
  </div>

  <button id="go">Generate</button>
</div>

<div id="timer" class="timer">Ready</div>

<!-- RESULTS -->
<div id="grid" class="grid"></div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Vectragen Platform
</div>
<toast-notification disapperance-timer timeout="12000"></toast-notification>
<script src="../scripts/components/toast-notification.js"></script>
<script>
const btn = document.getElementById('go');
const grid = document.getElementById('grid');
const timerText = document.getElementById('timer');
const noticationType = {
  PRIMARY_COLOR :'#fff',
  PRIMARY_FONT_COLOR: '#000',
  WARNING_COLOR: '#ffcc00',
  WARNING_FONT_COLOR: '#5c0b0b',
  DANGER_COLOR: '#f44336',
  DANGER_FONT_COLOR: '#fff',
  SUCCESS_COLOR: '#1a68bc',
  SUCCESS_FONT_COLOR: '#fff'
};
const toastNotification = document.querySelector("toast-notification");
const showNotification = (bcolor = null, fcolor = null, msg = null) => {
  toastNotification.setAttribute('background', bcolor || '#000');
  toastNotification.setAttribute('color', fcolor || '#fff');
  toastNotification.setAttribute("message", msg || 'Notification');
}

async function fetchImage(prompt) {
  const body = new URLSearchParams();
  body.append('prompt', prompt);

  const resp = await fetch('http://localhost:5000/test-generate', {
    method: 'POST',
    body: body
  });

  const blob = await resp.blob();

  return {
    url: URL.createObjectURL(blob),
    seed: resp.headers.get('x-used-seed')
  };
}

btn.onclick = async () => {
  const prompt = document.getElementById('prompt').value;
  const count = document.getElementById('variants').value;

  btn.disabled = true;
  grid.innerHTML = '';

  const start = performance.now();

  const clock = setInterval(() => {
    timerText.innerText =
      `Executing: ${((performance.now() - start)/1000).toFixed(2)}s`;
  }, 100);

  try {
    const tasks = Array.from({ length: count }).map(() => fetchImage(prompt));
    showNotification(noticationType.PRIMARY_COLOR, noticationType.PRIMARY_FONT_COLOR, `Generating ${count} variants ...`);
    const results = await Promise.all(tasks);
    showNotification(noticationType.SUCCESS_COLOR, noticationType.SUCCESS_FONT_COLOR, `Image Generation Successful`);
    results.forEach((res) => {
      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
        <img src="${res.url}">
        <div class="card-info">
          <span>Seed: ${res.seed}</span>
          <a href="${res.url}" download="gen_${res.seed}.png" class="download-btn">Save</a>
        </div>
      `;

      grid.appendChild(div);
    });
  } catch (e) {
    showNotification(noticationType.DANGER_COLOR, noticationType.DANGER_FONT_COLOR, `Generation Error: Check if backend is READY.`);
  } finally {
    clearInterval(clock);
    btn.disabled = false;
    timerText.innerText += " (Done!)";
  }
};
</script>

</body>
</html>
