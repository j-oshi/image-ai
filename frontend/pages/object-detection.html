<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Object Explorer</title>
<link rel="stylesheet" href="../styles/styles.css">
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<style>
/* LAYOUT */
.container {
  max-width: 1100px;
  margin: 20px auto 60px;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
  padding: 0 20px;
}

/* PANEL */
.panel {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e5e7eb;
  padding: 20px;
}

/* INPUTS */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 15px;
}

label {
  font-size: 13px;
  color: #555;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  margin-top: 10px;
}

.primary { background: #4f46e5; color: white; }
.secondary { background: #e5e7eb; }
.danger { background: #ef4444; color: white; }

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* CANVAS AREA */
.canvas-area {
  position: relative;
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e5e7eb;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CANVAS */
canvas {
  max-width: 100%;
  border-radius: 10px;
  border: 1px solid #ddd;
  display: none;
}

/* PLACEHOLDER */
#placeholder {
  text-align: center;
  color: #888;
  border: 2px dashed #ddd;
  padding: 60px;
  border-radius: 12px;
}

/* LOADER */
#loader {
  position: absolute;
  background: rgba(79,70,229,0.9);
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #888;
  font-size: 13px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <h2>AI Vision</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="#">Docs</a>
    <a href="#">Models</a>
    <a href="#">GitHub</a>
  </div>
</div>

<div style="text-align:left; margin-top:20px; margin-left:20px;">
  <a href="../index.html" style="
    text-decoration:none;
    color:#4f46e5;
    font-size:14px;
    border:1px solid #e5e7eb;
    padding:6px 12px;
    border-radius:8px;
    background:#fff;
  ">
    ← Back to Home
  </a>
</div>

<!-- HERO -->
<section class="hero">
  <h1>AI Object Explorer</h1>
  <p>Detect, filter, and analyze objects in images using local AI models.</p>
</section>

<!-- MAIN -->
<div class="container">

  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="input-group">
      <label>Upload Image</label>
      <input id="uploadInput" type="file" accept="image/*"/>
    </div>

    <div class="input-group">
      <label>Filter Labels</label>
      <input id="filterInput" type="text" placeholder="e.g. laptop, cup"/>
    </div>

    <button id="runBtn" class="primary">Run Detection</button>
    <button id="resetBtn" class="secondary">Clear</button>

    <p style="font-size:12px; color:#888; margin-top:15px;">
      Model: YOLOv8m<br>Status: Ready
    </p>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div id="loader">Processing...</div>

    <div id="placeholder">
      Upload an image to start
    </div>

    <canvas id="mainCanvas"></canvas>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 AI Vision Platform
</div>

<script>
const uploadInput = document.getElementById("uploadInput");
const filterInput = document.getElementById("filterInput");
const runBtn = document.getElementById("runBtn");
const resetBtn = document.getElementById("resetBtn");
const loader = document.getElementById("loader");
const canvas = document.getElementById("mainCanvas");
const placeholder = document.getElementById("placeholder");

let currentFile = null;
let session = null;

/* PREVIEW */
uploadInput.addEventListener("change", (e) => {
  currentFile = e.target.files[0];
  if (!currentFile) return;

  const reader = new FileReader();
  reader.onload = (event) => {
    const img = new Image();
    img.onload = () => {
      placeholder.style.display = "none";
      canvas.style.display = "block";
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext("2d").drawImage(img, 0, 0);
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(currentFile);
});

/* RESET */
resetBtn.onclick = () => {
  currentFile = null;
  uploadInput.value = "";
  filterInput.value = "";
  canvas.style.display = "none";
  placeholder.style.display = "block";
  canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
};

/* RUN */
runBtn.onclick = async () => {
  if (!currentFile) return alert("Upload image");

  runBtn.disabled = true;
  loader.style.display = "block";

  try {
    const filters = filterInput.value.toLowerCase().split(',').map(s => s.trim()).filter(Boolean);

    const boxes = await detect_objects_on_image(currentFile);
    const filtered = filters.length ? boxes.filter(b => filters.includes(b[4].toLowerCase())) : boxes;

    await draw_image_and_boxes(currentFile, filtered);
  } catch (e) {
    alert("Error");
  } finally {
    runBtn.disabled = false;
    loader.style.display = "none";
  }
};

/* DRAW */
async function draw_image_and_boxes(file, boxes) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = () => {
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      boxes.forEach(([x1,y1,x2,y2,label,prob]) => {
        ctx.strokeStyle = "#4f46e5";
        ctx.lineWidth = 3;
        ctx.strokeRect(x1, y1, x2-x1, y2-y1);

        ctx.fillStyle = "#4f46e5";
        ctx.fillRect(x1, y1-25, 120, 25);

        ctx.fillStyle = "#fff";
        ctx.fillText(label + " " + Math.round(prob*100)+"%", x1+5, y1-8);
      });

      resolve();
    };
  });
}

/* MODEL (unchanged core) */
async function detect_objects_on_image(buf) {
  const [input, w, h] = await prepare_input(buf);
  const output = await run_model(input);
  return process_output(output, w, h);
}

 async function prepare_input(buf) {
            return new Promise(resolve => {
                const img = new Image();
                img.src = URL.createObjectURL(buf);
                img.onload = () => {
                    const offscreen = document.createElement("canvas");
                    offscreen.width = 640; offscreen.height = 640;
                    const ctx = offscreen.getContext("2d");
                    ctx.drawImage(img, 0, 0, 640, 640);
                    const data = ctx.getImageData(0, 0, 640, 640).data;
                    const red = [], green = [], blue = [];
                    for (let i = 0; i < data.length; i += 4) {
                        red.push(data[i] / 255.0);
                        green.push(data[i+1] / 255.0);
                        blue.push(data[i+2] / 255.0);
                    }
                    resolve([[...red, ...green, ...blue], img.width, img.height]);
                }
            })
        }

        async function run_model(input) {
            if (!session) {
                loader.innerText = "Loading AI Model...";
                session = await ort.InferenceSession.create("yolov8m.onnx");
                loader.innerText = "Processing...";
            }
            const tensor = new ort.Tensor(Float32Array.from(input), [1, 3, 640, 640]);
            const outputs = await session.run({ images: tensor });
            return outputs["output0"].data;
        }

        function process_output(output, img_width, img_height) {
            let boxes = [];
            for (let index = 0; index < 8400; index++) {
                const [class_id, prob] = [...Array(80).keys()]
                    .map(col => [col, output[8400 * (col + 4) + index]])
                    .reduce((accum, item) => item[1] > accum[1] ? item : accum, [0, 0]);
                if (prob < 0.45) continue;
                const xc = output[index], yc = output[8400+index], w = output[2*8400+index], h = output[3*8400+index];
                boxes.push([(xc-w/2)/640*img_width, (yc-h/2)/640*img_height, (xc+w/2)/640*img_width, (yc+h/2)/640*img_height, yolo_classes[class_id], prob]);
            }
            boxes.sort((a, b) => b[5] - a[5]);
            const result = [];
            while (boxes.length > 0) {
                result.push(boxes[0]);
                boxes = boxes.filter(box => iou(boxes[0], box) < 0.7);
            }
            return result;
        }

        function iou(b1, b2) {
            const x1 = Math.max(b1[0], b2[0]), y1 = Math.max(b1[1], b2[1]), x2 = Math.min(b1[2], b2[2]), y2 = Math.min(b1[3], b2[3]);
            const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
            const area1 = (b1[2]-b1[0])*(b1[3]-b1[1]), area2 = (b2[2]-b2[0])*(b2[3]-b2[1]);
            return inter / (area1 + area2 - inter);
        }

        const yolo_classes = ['person','bicycle','car','motorcycle','airplane','bus','train','truck','boat','traffic light','fire hydrant','stop sign','parking meter','bench','bird','cat','dog','horse','sheep','cow','elephant','bear','zebra','giraffe','backpack','umbrella','handbag','tie','suitcase','frisbee','skis','snowboard','sports ball','kite','baseball bat','baseball glove','skateboard','surfboard','tennis racket','bottle','wine glass','cup','fork','knife','spoon','bowl','banana','apple','sandwich','orange','broccoli','carrot','hot dog','pizza','donut','cake','chair','couch','potted plant','bed','dining table','toilet','tv','laptop','mouse','remote','keyboard','cell phone','microwave','oven','toaster','sink','refrigerator','book','clock','vase','scissors','teddy bear','hair drier','toothbrush'];
</script>

</body>
</html>
